<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width">
  <title>Quacken</title>

  <style>
    html {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body {
      margin: 1em auto;
      max-width: 64em;
      width: 100%;
      text-align: center;
      font-family: sans-serif;
    }
    h1 {
      margin-bottom: 0;
    }
    h1 + p {
      margin-top: 0;
      font-size: 1.2em;
    }
    svg {
      width: 100%;
    }

    /* keyboard geometry (XXX magic numbers) */
    #left    { transform: translate(-12px, 45px); }
    #right   { transform: translate(908px, 45px); }
    #outline { transform: translate(478px, 191px) scale(3.338, -3.338); }

    #left  .matrix { transform-origin:  0px   56px; }
    #left  .thumb  { transform-origin: -14px -62px; }
    #right .matrix { transform-origin:  70px  56px; }
    #right .thumb  { transform-origin:  74px -62px; }

    /* color theme */
    :root {
      color-scheme: light dark;
    }
    rect {
      fill: #fff;
      stroke: #999;
    }
    text {
      fill: #444;
      font: normal 11px sans-serif;
      text-align: center;
      text-anchor: middle;
    }
    .dualKey {
      fill: #ddd;
    }
    #board use,
    #board path {
      fill:   #7889a2;
      stroke: #7889a280;
      fill:   #78a289;
      stroke: #78a28980;
      fill:   rgba(130, 156, 175, 0.60);
      stroke: rgba(130, 156, 175, 0.20);
      stroke-width: 1.0px;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @media (prefers-color-scheme: dark) {
      /* TODO */
    }

    .col1 rect,
    .col2 rect,
    .col3 rect,
    .col4 rect,
    .col5 rect,
    .col6 rect {
      stroke-width: 0.6px !important;
    }
  </style>

</head>
<body>
  <h1>Quacken</h1>
  <p>Libre. Ergonomic. Polymorphic.</p>
  <select onchange="setConfig(this.value.toLowerCase())">
    <option>Raven</option>        <!-- Corbeau  -->
    <option>Owl</option>          <!-- Chouette -->
    <option>Sparrowhawk</option>  <!-- Épervier -->
    <option>Hoopoe</option>       <!-- Huppe    -->
    <!-- 34 keys -->
    <option>Bluethroat</option>   <!-- Gorgebleue -->
    <option>Swift</option>        <!-- Martinet   -->
    <option>Swallow</option>      <!-- Hirondelle -->
    <!-- 32 keys -->
    <option>Kingfisher</option>   <!-- Martin-pêcheur -->
    <option>Finch</option>        <!-- Pinson         -->
  </select>

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="38 -12 880 380">
    <g id="outline">
      <g id="board">
        <path id="flex-half" d="m0 42 q-51 28-131 10 v-68 q86 0 112 -35 l19 15z"/>
        <use href="#flex-half" transform="scale(-1 1)"/>
      </g>
    </g>
    <g id="left">
      <g class="outer matrix">
        <g class="col6">
          <g class="key top"/>
          <g class="key home"/>
          <g class="key bottom"/>
        </g>
        <g class="col6m">
          <g class="key top"/>
          <g class="key home"/>
        </g>

        <g class="pinky matrix">
          <g class="col5">
            <g class="key top"/>
            <g class="key home"/>
            <g class="key bottom"/>
          </g>
          <g class="col5m">
            <g class="key top"/>
            <g class="key home"/>
          </g>

          <g class="ring matrix">
            <g class="col4">
              <g class="key top"/>
              <g class="key home dual"/>
              <g class="key bottom"/>
            </g>

            <g class="middle matrix">
              <g class="col3">
                <g class="key top"/>
                <g class="key home dual"/>
                <g class="key bottom"/>
              </g>

              <g class="index matrix">
                <g class="col2">
                  <g class="key top"/>
                  <g class="key home dual"/>
                  <g class="key bottom"/>
                </g>

                <g class="thumbCluster">
                  <g class="tucked thumb">
                    <g class="key"/>
                    <g class="comfy thumb">
                      <g class="key"/>
                      <g class="reachy thumb">
                        <g class="key"/>
                      </g>
                    </g>
                  </g>
                </g>

                <g class="inner matrix">
                  <g class="col1">
                    <g class="key top"/>
                    <g class="key home"/>
                    <g class="key bottom"/>
                  </g>
                  <g class="col1m">
                    <g class="key top"/>
                    <g class="key home"/>
                  </g>
                </g>
              </g>
            </g>
          </g>
        </g>
      </g>
    </g>

    <g id="right">
      <g class="outer matrix">
        <g class="col6">
          <g class="key top"/>
          <g class="key home"/>
          <g class="key bottom"/>
        </g>
        <g class="col6m">
          <g class="key top"/>
          <g class="key home"/>
        </g>

        <g class="pinky matrix">
          <g class="col5">
            <g class="key top"/>
            <g class="key home"/>
            <g class="key bottom"/>
          </g>
          <g class="col5m">
            <g class="key top"/>
            <g class="key home"/>
          </g>

          <g class="ring matrix">
            <g class="col4">
              <g class="key top"/>
              <g class="key home dual"/>
              <g class="key bottom"/>
            </g>

            <g class="middle matrix">
              <g class="col3">
                <g class="key top"/>
                <g class="key home dual"/>
                <g class="key bottom"/>
              </g>

              <g class="index matrix">
                <g class="col2">
                  <g class="key top"/>
                  <g class="key home dual"/>
                  <g class="key bottom"/>
                </g>

                <g class="thumbCluster">
                  <g class="tucked thumb">
                    <g class="key"/>
                    <g class="comfy thumb">
                      <g class="key"/>
                      <g class="reachy thumb">
                        <g class="key"/>
                      </g>
                    </g>
                  </g>
                </g>

                <g class="inner matrix">
                  <g class="col1">
                    <g class="key top"/>
                    <g class="key home"/>
                    <g class="key bottom"/>
                  </g>
                  <g class="col1m">
                    <g class="key top"/>
                    <g class="key home"/>
                  </g>
                </g>
              </g>
            </g>
          </g>
        </g>
      </g>
    </g>
  </svg>

  <script>// keyboard geometry -- could be hard-coded in the stylesheet
    const columns = [ "outer", "pinky", "ring", "middle", "index", "inner" ];
    const thumbs = [ "tucked", "comfy", "reachy" ];
    const rows = [ "top", "home", "bottom" ];

    // Ergogen values, relative to one another, from outer/pinky to inner/index
    const col_stagger = [ 0, 0.195, 0.600, 0.350, -0.250, -0.195 ];
    const alt_stagger = [ 0.305, 0.695, 0.0, 0.0, 0.0, 0.305 ]; // median keys
    const col_splay = [ 0, 0, 9, 6, 0, 0 ];
    const thumb_stagger = [ -3.4, 0, 0 ];
    const thumb_spread = [ -1, 0, 0 ];
    const thumb_splay = [ 0, 16, 16 ];

    // choc spacing = 18*17mm, scaled to stay close to x-keyboard's 60*60px
    const kw = 60.0;
    const kh = 56.67;

    // apply geometry
    let sheet = window.document.styleSheets[0];
    const cssTransform = (selector, transform) => {
      sheet.insertRule(`${selector} { transform: ${transform} }`);
    }
    const svgTransform = (selector, transform) => {
      document.querySelectorAll(selector).forEach(element => {
        element.setAttribute("transform", transform);
      });
    }

    const matrix = (dx, dy, angle) => {
      const rad = angle * Math.PI / 180.0;
      const cos = Math.cos(rad);
      const sin = Math.sin(rad);
      const tx = kw * (dx + sin * 2);
      const ty = kh * dy;
      return [
        `matrix(${cos}, ${sin}, ${-sin}, ${cos}, ${tx}, ${-ty})`,
        `matrix(${cos}, ${-sin}, ${sin}, ${cos}, ${-tx}, ${-ty})`
      ];
    }

    columns.forEach((name, i) => {
      const [left, right] = matrix(1, col_stagger[i], col_splay[i]);
      svgTransform(`#left  .${name}`, left);
      svgTransform(`#right .${name}`, right);
      svgTransform(`.col${6 - i}m`, `translate(0 ${alt_stagger[i] * kh})`);
    });
    rows.forEach((name, i) => { // XXX ends up with a lot of unused rules
      cssTransform(`.${name}`, `translateY(${i * kh}px)`);
    });

    const leftThumb  = document.querySelector("#left  .thumbCluster");
    const rightThumb = document.querySelector("#right .thumbCluster");
    leftThumb.setAttribute("x", -kw);
    leftThumb.setAttribute("y", 3 * kh);
    rightThumb.setAttribute("x", kw);
    rightThumb.setAttribute("y", 3 * kh);
    thumbs.forEach((name, i) => {
      const [left, right] = matrix(1 + thumb_spread[i], thumb_stagger[i], thumb_splay[i]);
      svgTransform(`#left  .thumbCluster .${name}`, left);
      svgTransform(`#right .thumbCluster .${name}`, right);
    });
  </script>

  <script>// keyboard configuration
    const birds = {
      // hummingbird-like, 32-34 keyx
      bluethroat:  [ ".col1", ".col5m", ".col6m", ".col6",                        ], // gorgebleue
      swift:       [ ".col1", ".col5m", ".col5 .bottom", ".col6", ".col6m .home", ], // martinet
      finch:       [ ".col1", ".col5m", ".col5 .bottom", ".col6", ".col6m",       ], // pinson
      swallow:     [ ".col1", ".col5", ".col6m", ".col6 .top", ".col6 .bottom",   ], // hirondelle
      kingfisher:  [ ".col1", ".col5", ".col6m", ".col6",                         ], // martin-pecheur
      // classic", [ "36-42 keyx
      hoopoe:      [ ".col1m", ".col5m", ".col6", ".col6m",      ], // huppe
      sparrowhawk: [ ".col1m", ".col5m", ".col6", ".col6m .top", ], // epervier
      owl:         [ ".col1m", ".col5m", ".col6",                ], // chouette
      raven:       [ ".col1m", ".col5m", ".col6m",               ], // corbeau
    };
    const showBird = (name) => {
      const selector = birds[name].map(sel => `${sel} rect`).join(", ");
      sheet.insertRule(`${selector} { fill: none; stroke-width: 0; }`, 0);
    };
    showBird("owl");
    const setConfig = (name) => {
      sheet.deleteRule(0);
      showBird(name);
    };
  </script>

  <script>// keyboard layout
    document.querySelectorAll(".matrix .key").forEach(key => {
      const dual = key.classList.contains("dual") ? `
        <rect width="${kw/2}" height="${kh/2}" rx="2" ry="2" y="${kh/2}" class="dualKey"/>
      ` : "";
      key.innerHTML = `
        <rect width="${kw}" height="${kh}" rx="5" ry="5"/>${dual}
        <text x="12.8" y="20.6" class="level2"></text>
        <text x="38.0" y="43.4" class="num"></text>
        <text x="38.0" y="43.4" class="nav"></text>
      `;
    });
    document.querySelectorAll(".thumb .key").forEach(key => {
      key.innerHTML = `
        <rect width="${kw}" height="${kh}" rx="5" ry="5"/>
        <rect width="${kw}" height="${kh/2}" rx="2" ry="2" y="${kh/2}" class="dualKey"/>
      `;
    });
    document.querySelector("select").selectedIndex = 1;
    document.querySelector("select").focus();
  </script>
</body>
</html>
